name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.32.5'

jobs:
  test:
    name: Analyse & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    name: Android-Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Versionsname aus dem Tag ableiten (v1.1.1 -> 1.1.1).
      - name: Build APKs und App Bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build apk --release --build-name="$VERSION" --build-number="$GITHUB_RUN_NUMBER"
          flutter build apk --release --split-per-abi --build-name="$VERSION" --build-number="$GITHUB_RUN_NUMBER"
          flutter build appbundle --release --build-name="$VERSION" --build-number="$GITHUB_RUN_NUMBER"

      - name: Pakete umbenennen
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/iptv-player-${GITHUB_REF_NAME}-android.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/iptv-player-${GITHUB_REF_NAME}-android-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/iptv-player-${GITHUB_REF_NAME}-android-armeabi-v7a.apk"
          cp build/app/outputs/bundle/release/app-release.aab "dist/iptv-player-${GITHUB_REF_NAME}-android.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android-packages
          path: dist/*
          if-no-files-found: error

  build-ios:
    name: iOS-Build
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Ohne Signierung gebaut: Die IPA muss vor der Installation
      # nachsigniert werden (z. B. mit AltStore/Sideloadly oder Xcode).
      - name: Build iOS (unsigniert)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build ios --release --no-codesign --build-name="$VERSION" --build-number="$GITHUB_RUN_NUMBER"

      - name: IPA paketieren
        run: |
          mkdir -p dist Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qr "dist/iptv-player-${GITHUB_REF_NAME}-ios-unsigned.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-packages
          path: dist/*
          if-no-files-found: error

  release:
    name: GitHub-Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: IPTV Player ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
